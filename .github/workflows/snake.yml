name: Generate Snake Animation

on:
  # 매일 자정(UTC) 자동 갱신
  schedule:
    - cron: "0 0 * * *"
  # main 푸시 시
  push:
    branches:
      - main
  # 수동 실행 허용
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=#2575fc&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
            dist/snake-light.svg?palette=github-light&color_snake=#6a11cb

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
